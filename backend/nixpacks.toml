[phases.setup]
nixPkgs = [
  "nodejs",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "pango",
  "cairo",
  "expat",
  "libdrm",
  "mesa",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb"
]

[variables]

# Indica a Puppeteer que no intente descargar Chrome en el servidor
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

# Indica dónde está el ejecutable de Chromium que instalamos con Nix
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"